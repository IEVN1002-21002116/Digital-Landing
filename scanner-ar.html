<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, user-scalable=no"
    />
    <title>Escáner AR | Digital Boost MX</title>

    <link rel="stylesheet" href="/css/style.css" />

    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-aframe.prod.js"></script>

    <script src="https://cdn.jsdelivr.net/gh/c-frame/aframe-extras@7.0.0/dist/aframe-extras.min.js"></script>

    <script src="js/ar-interaction.js" defer></script>

    <style>
      /* Ajustes específicos para que la interfaz no bloquee la cámara */
      #ar-view {
        width: 100vw;
        height: 100vh;
        position: fixed;
        top: 0;
        left: 0;
        z-index: 1;
      }

      .ar-standalone {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        z-index: 10; /* Por encima de la escena 3D */
        pointer-events: none; /* Permite tocar el 3D a través de este contenedor */
      }

      /* Reactivamos eventos solo para los botones reales */
      .ar-header,
      .btn,
      #start-ar-btn {
        pointer-events: auto;
      }

      .ar-header {
        padding: 20px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        background: linear-gradient(to bottom, rgba(2, 1, 5, 0.8), transparent);
      }

      /* ─── Fix móvil: evita que el logo escamado se empalme con el botón ─── */
      @media (max-width: 600px) {
        .ar-header {
          padding: 14px 16px;
          gap: 10px;
        }

        /* El contenedor del logo se convierte en un bloque flex limitado;
           overflow:hidden recorta el overflow visual del transform sin
           alterar el botón de la derecha. */
        .ar-header .logo {
          flex: 1 1 auto;
          min-width: 0;
          overflow: hidden;
        }

        /* Reducimos la escala para que encaje en el espacio disponible.
           !important es necesario para sobrescribir el inline-style. */
        .ar-header .logo img {
          height: 42px !important;
          transform: scale(1.8) !important;
          transform-origin: left center;
        }

        /* El botón no se encoge, mantiene su forma y texto legible. */
        .ar-header .btn {
          flex-shrink: 0;
          white-space: nowrap;
          font-size: 0.65rem !important;
          padding: 7px 14px !important;
        }
      }

      /* ─── Fix bordes del escáner: .scanner-frame hereda de style.css estilos
         pensados para el HUD demo del index (height:450px, background oscuro,
         border-radius, overflow:hidden). Aquí lo convertimos en un overlay
         transparente de pantalla completa donde solo las esquinas son visibles. ─── */
      .ar-standalone .scanner-frame {
        height: 100% !important; /* full-screen, no 450px */
        background: transparent !important; /* la cámara debe verse detrás */
        border: none !important; /* sin borde de caja */
        border-radius: 0 !important; /* sin redondeo que distorsiona esquinas */
        overflow: visible !important; /* las corners no se recortan */
      }
    </style>
  </head>
  <body>
    <div id="ar-view"></div>

    <div class="ar-standalone">
      <header class="ar-header">
        <div class="logo">
          <img
            src="assets/tarjeta/DB isotipo.png"
            alt="Digital Boost MX"
            style="
              height: 80px;
              width: auto;
              object-fit: contain;
              transform: scale(3.5);
              transform-origin: left center;
            "
          />
        </div>
        <a
          href="index.html"
          class="btn btn-outline"
          style="font-size: 0.7rem; padding: 8px 16px"
        >
          ← Volver al sitio
        </a>
      </header>

      <div
        id="scanner-idle"
        class="scanner-idle"
        style="
          position: absolute;
          top: 50%;
          left: 50%;
          transform: translate(-50%, -50%);
          text-align: center;
          width: 100%;
        "
      >
        <div class="scanner-icon" style="margin-bottom: 20px">
          <svg
            width="60"
            height="60"
            viewBox="0 0 24 24"
            fill="none"
            stroke="#f271d9"
            stroke-width="1.5"
          >
            <path
              d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"
            ></path>
            <circle cx="12" cy="13" r="4"></circle>
          </svg>
        </div>
        <p
          style="
            color: var(--text-muted);
            font-size: 0.9rem;
            letter-spacing: 1px;
            margin-bottom: 30px;
          "
        >
          Apunta a nuestra tarjeta física
        </p>
        <button id="start-ar-btn" class="btn btn-primary">
          ACTIVAR CÁMARA
        </button>
      </div>

      <div
        class="scanner-frame"
        style="position: absolute; inset: 0; pointer-events: none"
      >
        <div class="corner top-left"></div>
        <div class="corner top-right"></div>
        <div class="corner bottom-left"></div>
        <div class="corner bottom-right"></div>
      </div>
    </div>
  </body>
</html>
