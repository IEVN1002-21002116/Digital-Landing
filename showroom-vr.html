<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>VR Showroom | Digital Boost MX</title>

    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>

    <script src="js/vr-showroom.js"></script>

    <style>
      /* Ocultar scrollbars ya que es un entorno inmersivo */
      body {
        margin: 0;
        overflow: hidden;
        background-color: #020108;
      }
    </style>
  </head>
  <body>
    <a-scene
      background="color: #020108"
      fog="type: exponential; color: #020108; density: 0.12"
      cursor="rayOrigin: mouse"
    >
      <a-light type="ambient" color="#222"></a-light>
      <a-light
        type="point"
        position="0 5 0"
        intensity="2"
        color="#8646f4"
        distance="20"
      ></a-light>
      <a-light
        type="directional"
        position="3 4 -3"
        intensity="1.5"
        color="#f271d9"
      ></a-light>
      <a-light
        type="directional"
        position="-3 1 -2"
        intensity="1"
        color="#8646f4"
      ></a-light>

      <a-plane
        position="0 0 0"
        rotation="-90 0 0"
        width="100"
        height="100"
        color="#0a0a0c"
        material="src: https://cdn.aframe.io/a-painter/images/floor.jpg; repeat: 100 100; transparent: true; opacity: 0.4; roughness: 0.8"
      ></a-plane>
      <a-entity
        position="-3 0 -5"
        class="interactable"
        vr-hover
        link-to="url: index.html#ia-module"
      >
        <a-box
          position="0 0.5 0"
          color="#0a0a0c"
          depth="0.6"
          height="1"
          width="0.6"
          material="metalness: 0.5; roughness: 0.2"
        ></a-box>
        <a-sphere
          position="0 1.5 0"
          radius="0.4"
          color="#8646f4"
          material="metalness: 0.8; roughness: 0.2; emissive: #8646f4; emissiveIntensity: 0.2"
          animation="property: position; to: 0 1.7 0; dir: alternate; dur: 2000; loop: true; easing: easeInOutSine"
        ></a-sphere>
        <a-text
          value="INTELIGENCIA\nARTIFICIAL"
          position="0 2.3 0"
          align="center"
          color="#ffffff"
          scale="0.6 0.6 0.6"
        ></a-text>
      </a-entity>

      <a-entity
        position="0 0 -6"
        class="interactable"
        vr-hover
        link-to="url: index.html"
      >
        <a-cylinder
          position="0 0.25 0"
          radius="0.8"
          height="0.5"
          color="#0a0a0c"
          material="metalness: 0.8; roughness: 0.2"
        ></a-cylinder>
        <a-torus-knot
          position="0 1.5 0"
          radius="0.3"
          radius-tubular="0.02"
          color="#f271d9"
          material="metalness: 0.9; roughness: 0.1"
          animation="property: rotation; to: 0 360 0; loop: true; dur: 4000; easing: linear"
        ></a-torus-knot>
        <a-text
          value="VOLVER A\nLA WEB"
          position="0 2.4 0"
          align="center"
          color="#f271d9"
          scale="0.7 0.7 0.7"
        ></a-text>
      </a-entity>

      <a-entity
        position="3 0 -5"
        class="interactable"
        vr-hover
        link-to="url: index.html#demo"
      >
        <a-box
          position="0 0.5 0"
          color="#0a0a0c"
          depth="0.6"
          height="1"
          width="0.6"
          material="metalness: 0.5; roughness: 0.2"
        ></a-box>
        <a-cylinder
          position="0 1.5 0"
          radius="0.3"
          height="0.6"
          color="#8646f4"
          material="metalness: 0.2; transparent: true; opacity: 0.6"
          animation="property: rotation; to: 360 360 0; loop: true; dur: 8000; easing: linear"
        ></a-cylinder>
        <a-box
          position="0 1.5 0"
          depth="0.4"
          height="0.4"
          width="0.4"
          color="#f271d9"
          material="wireframe: true"
          animation="property: rotation; to: -360 -360 0; loop: true; dur: 10000; easing: linear"
        ></a-box>
        <a-text
          value="REALIDAD\nAUMENTADA"
          position="0 2.3 0"
          align="center"
          color="#ffffff"
          scale="0.6 0.6 0.6"
        ></a-text>
      </a-entity>

      <a-entity position="0 1.6 0">
        <a-camera
          id="player-camera"
          look-controls
          wasd-controls="acceleration: 15"
        >
          <a-entity
            cursor="fuse: true; fuseTimeout: 1500"
            position="0 0 -1"
            geometry="primitive: ring; radiusInner: 0.02; radiusOuter: 0.03"
            material="color: #f271d9; shader: flat; opacity: 0.8"
            raycaster="objects: .interactable"
            animation__fusing="property: scale; startEvents: fusing; easing: easeInCubic; dur: 1500; from: 1 1 1; to: 0.1 0.1 0.1"
            animation__mouseleave="property: scale; startEvents: mouseleave; easing: easeInCubic; dur: 500; to: 1 1 1"
          >
          </a-entity>
        </a-camera> </a-entity
    ></a-scene>
  </body>
</html>
